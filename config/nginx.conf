# /etc/nginx/sites-available/ecommerce-poc
# Enable: sudo ln -s /etc/nginx/sites-available/ecommerce-poc /etc/nginx/sites-enabled/
# Test  : sudo nginx -t
# Reload: sudo systemctl reload nginx

upstream ecommerce_poc {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;   # Replace _ with your domain name or Elastic IP

    access_log /var/log/nginx/ecommerce-poc.access.log;
    error_log  /var/log/nginx/ecommerce-poc.error.log warn;

    # Increase body size limit if you expect large request payloads
    client_max_body_size 10M;

    # Proxy all traffic to the FastAPI application
    location / {
        proxy_pass         http://ecommerce_poc;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        proxy_connect_timeout  30s;
        proxy_read_timeout     60s;
        proxy_send_timeout     60s;

        proxy_buffering    on;
        proxy_buffer_size  16k;
        proxy_buffers      4 32k;
    }

    # Health check (suppress access logs to reduce noise)
    location = /health {
        proxy_pass  http://ecommerce_poc/health;
        access_log  off;
    }

    # FastAPI auto-generated docs
    location ~ ^/(docs|redoc|openapi\.json) {
        proxy_pass         http://ecommerce_poc;
        proxy_set_header   Host $host;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
    }
}
